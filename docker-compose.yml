services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: clinicsay
      POSTGRES_USER: clinicsay
      POSTGRES_PASSWORD: clinicsay
    ports:
      - '5432:5432'
    volumes:
      - clinicsay_api_db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U clinicsay -d clinicsay']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://clinicsay:clinicsay@db:5432/clinicsay
      PORT: 3000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'

volumes:
  clinicsay_api_db:
